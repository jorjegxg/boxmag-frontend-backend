services:
  mysql:
    image: mysql:8.0
    container_name: boxmag4-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-boxmag4}"
      MYSQL_USER: "${MYSQL_USER:-boxmag4}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-boxmag4}"
      TZ: "${TZ:-UTC}"
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - boxmag4_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: quay.io/minio/minio:latest
    container_name: boxmag4-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT_API:-9000}:9000"
      - "${MINIO_PORT_CONSOLE:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-boxmagadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-change-me-minio-password}"
    command: server /data --console-address ":9001"
    volumes:
      - boxmag4_minio_data:/data

volumes:
  boxmag4_mysql_data:
  boxmag4_minio_data:
